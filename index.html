<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SecureVPN • Luxury Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    background: #0d0d0d;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
}
.box {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 15px;
    max-width: 420px;
    margin: auto;
    border: 1px solid #333;
}
button {
    background: #4c6ef5;
    color: white;
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    width: 100%;
}
button:disabled {
    background: #333;
}
.code-box {
    background: #000;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
    word-break: break-all;
    border: 1px solid #444;
}
</style>
</head>

<body>

<div class="box">
    <h2>SecureVPN • Luxury Access</h2>
    <p id="status">Ожидание...</p>
    <button id="btn" disabled>Получить ключ</button>

    <div id="result" class="code-box" style="display:none;"></div>
</div>

<script>
// ===== Получаем token из URL =====
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token");

const btn = document.getElementById("btn");
const status = document.getElementById("status");
const result = document.getElementById("result");

if (!token) {
    status.innerHTML = "❌ Ошибка: нет токена.";
} else {
    status.innerHTML = "Готово. Нажмите кнопку.";
    btn.disabled = false;
}

// ===== Отправка данных в Telegram Bot =====
btn.onclick = async () => {
    btn.disabled = true;
    status.innerHTML = "⏳ Создание ключа...";

    const data = {
        action: "get_key",
        token: token
    };

    try {
        Telegram.WebApp.sendData(JSON.stringify(data));
        status.innerHTML = "📨 Запрос отправлен. Проверьте Telegram.";
    } catch (e) {
        status.innerHTML = "❌ Ошибка отправки.";
        btn.disabled = false;
    }
};
</script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
